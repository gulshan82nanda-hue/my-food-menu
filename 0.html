<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>my food menu</title>
   <style>
      body{
         font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
         background-color: blue;
         padding: 30px;
         text-align: center;
      }
      h1{
         color: red;
      }
      input[type="text"]{
         background-color: aqua;
      }
      h1+p{
         background: lightpink;
         padding: 10px 20px;
         border-radius: 8px;
         color: brown;
         display: inline-block;
      }
      ul>li{
         list-style: none;
         font-size: 18px;
         font-weight: bold;
         color: black;
         padding: 10px 20px;
         margin: 6px auto;
         width: 260px;
         background-color: azure;
         border-radius: 8px;
      }
      a:hover{
         background-color: lightgray;
         color: purple;
      }
      li:nth-child(3){
         background-color: aquamarine;
         color: lightblue;
      }
      .desc {

color: #555;

margin-top: 20px;

font-size: 15px;

max-width: 400px;

margin-left: auto;

margin-right: auto;

}
a {

color: #e65c00;

text-decoration: none;

font-size: 15px;

margin: 0 12px;

padding: 8px 18px;

border: 2px solid #e65c00;

border-radius: 8px;

}
.desc::first-letter{
   font-size: 220%;
   color: red;
   font-weight: bold;
}
.links {

margin-top: 25px;

}

ul {

padding: 0;

margin-top: 20px;

}
   </style>
</head>
<body>
   <input type="text" placeholder="enter you name">

<h1>My Food Menu</h1>

<p>Pick your favourite dish and dig in!</p>

<ul>

<li>Pizza</li>

<li>Burger</li>

<li>Tacos — Chef's Special!</li>

<li>Noodles</li>

<li>Ice Cream</li>

</ul>

<p class="desc">Every dish on this menu is made with love and

loads of flavour. Try them all and find your favourite!</p>

<div class="links">

<a href="#">Order Now</a>

<a href="#">See More</a>

</div>


</body>
</html>
